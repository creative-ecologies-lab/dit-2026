name: Auto-archive closed-unmerged PRs

# When a PR is closed without merging AND its branch has unique commits not
# in the default branch, tag the branch tip as `archive/<branch>-<YYYY-MM-DD>`
# before GitHub auto-deletes the branch (when delete_branch_on_merge is on).
#
# This preserves abandoned work for later salvage without keeping stale
# branches in the branch list.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  archive:
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag branch tip if it has unique commits
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          # Sanitize branch name for use in a tag (replace / with -)
          safe_branch="${BRANCH//\//-}"
          tag_name="archive/${safe_branch}-$(date -u +%Y-%m-%d)"

          echo "PR closed unmerged: $BRANCH @ $SHA"
          echo "Default branch: $DEFAULT_BRANCH"
          echo "Proposed tag: $tag_name"

          # Skip if the head SHA isn't reachable (force-pushed away after PR closed)
          if ! git cat-file -e "$SHA" 2>/dev/null; then
            echo "Head SHA $SHA is no longer reachable; skipping archive."
            exit 0
          fi

          # Skip if the head SHA is already an ancestor of the default branch
          # (i.e. the work is already on main — nothing to preserve)
          if git merge-base --is-ancestor "$SHA" "origin/$DEFAULT_BRANCH" 2>/dev/null; then
            echo "Head SHA is already in $DEFAULT_BRANCH; nothing unique to archive."
            exit 0
          fi

          # Count unique commits not in default branch
          unique_count=$(git rev-list --count "origin/$DEFAULT_BRANCH..$SHA" 2>/dev/null || echo 0)
          echo "Unique commits not in $DEFAULT_BRANCH: $unique_count"

          if [ "$unique_count" -eq 0 ]; then
            echo "No unique commits; skipping archive."
            exit 0
          fi

          # Skip if a tag with this name already exists (e.g. workflow re-ran)
          if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name already exists; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag_name" "$SHA" -m "Archive of PR #${{ github.event.pull_request.number }} (closed unmerged)

PR title: ${{ github.event.pull_request.title }}
Branch:   $BRANCH
HEAD:     $SHA
Unique commits not in $DEFAULT_BRANCH: $unique_count

Auto-tagged by .github/workflows/auto-archive-closed-prs.yml on PR close."

          git push origin "$tag_name"
          echo "Tagged: $tag_name"
