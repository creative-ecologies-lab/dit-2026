<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Where are you on your AI journey?{% endblock %}</title>
    <meta name="description" content="Map your AI skills and find where to take them next. Based on John Maeda's Design in Tech Report 2026.">
    <meta property="og:title" content="The Tree-Shaped Designer — AI Upskilling Map">
    <meta property="og:description" content="What shape is your tree? Self-assessment for designers and UX researchers. Based on John Maeda's Design in Tech Report 2026.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://aiskillsmap.noahratzan.com/">
    <meta property="og:image" content="https://aiskillsmap.noahratzan.com/static/og-tree.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Tree-shaped designer illustration — roots represent craft depth, canopy represents AI breadth">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Tree-Shaped Designer — AI Upskilling Map">
    <meta name="twitter:description" content="What shape is your tree? Self-assessment for designers and UX researchers. Based on John Maeda's DIT 2026.">
    <meta name="twitter:image" content="https://aiskillsmap.noahratzan.com/static/og-tree.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav" role="navigation" aria-label="Main navigation">
        <div class="nav-brand">
            <a href="/" aria-label="AI Upskilling Map home">AI Upskilling Map for Designers &amp; UX Researchers</a>
        </div>
        <div class="nav-links" role="list">
            <a href="/" role="listitem" class="{% if request.path == '/' %}active{% endif %}" {% if request.path == '/' %}aria-current="page"{% endif %}>Home</a>
            <a href="/about" role="listitem" class="{% if request.path == '/about' %}active{% endif %}" {% if request.path == '/about' %}aria-current="page"{% endif %}>About</a>
            <a href="/framework" role="listitem" class="{% if '/framework' in request.path %}active{% endif %}" {% if '/framework' in request.path %}aria-current="page"{% endif %}>Framework</a>
            <a href="/group-id" role="listitem" class="{% if request.path in ['/group-id', '/group', '/groups', '/group-ids'] %}active{% endif %}" {% if request.path in ['/group-id', '/group', '/groups', '/group-ids'] %}aria-current="page"{% endif %}>Group ID</a>
        </div>
    </nav>
    <main id="main-content" class="container" role="main">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer" role="contentinfo">
        <p>Based on the Design in Tech Report 2026: From UX to AX by John Maeda. Site and tool built by Noah Ratzan.</p>
    </footer>
    <script>
    // Persist UTM params to sessionStorage so they survive navigation to /assess
    (function(){
        var p=new URLSearchParams(window.location.search);
        ['utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){
            if(p.get(k)) sessionStorage.setItem(k, p.get(k));
        });
    })();
    </script>
    <script>
    // Lightweight analytics event tracker — no cookies, no PII.
    // Generates a random session ID per browser session and fires events
    // to /api/event via sendBeacon (non-blocking).
    window.dit = window.dit || {};
    (function(){
        'use strict';
        var SID_KEY = 'ditSessionId';
        var sid = sessionStorage.getItem(SID_KEY);
        if (!sid) {
            sid = Math.random().toString(36).slice(2) + Date.now().toString(36);
            sessionStorage.setItem(SID_KEY, sid);
        }
        dit.sid = sid;

        function getUtm() {
            var o = {};
            ['utm_source','utm_medium','utm_campaign'].forEach(function(k){
                var v = sessionStorage.getItem(k);
                if (v) o[k] = v;
            });
            return o;
        }

        dit.track = function(event, props) {
            props = props || {};
            var payload = JSON.stringify({
                event: event,
                sid: sid,
                props: Object.assign({}, getUtm(), props)
            });
            // sendBeacon is fire-and-forget, doesn't block navigation
            if (navigator.sendBeacon) {
                navigator.sendBeacon('/api/event', new Blob([payload], {type: 'application/json'}));
            } else {
                // Fallback for older browsers
                var x = new XMLHttpRequest();
                x.open('POST', '/api/event', true);
                x.setRequestHeader('Content-Type', 'application/json');
                x.send(payload);
            }
        };

        // Auto-track page views
        var vw = window.innerWidth + 'x' + window.innerHeight;
        var isMobile = /iPhone|Android|Mobile|iPad/i.test(navigator.userAgent);
        dit.track('page_view', {
            path: location.pathname,
            referrer: document.referrer ? (new URL(document.referrer)).hostname : '',
            viewport: vw,
            device: isMobile ? 'mobile' : 'desktop'
        });

        // Track assessment abandonment on page unload (if on /assess with in-progress state)
        window.addEventListener('pagehide', function() {
            if (location.pathname !== '/assess') return;
            var s = sessionStorage.getItem('ditAssessmentState');
            if (!s) return;
            try {
                var state = JSON.parse(s);
                // Only fire if they started but didn't submit (no results stored)
                if (state.stage && state.stage !== 'intake' && !sessionStorage.getItem('ditResult')) {
                    dit.track('assess_abandon', {
                        stage: state.stage,
                        sae_answered: Object.keys(state.saeAnswers || {}).length,
                        epias_answered: Object.keys(state.epiasAnswers || {}).length
                    });
                }
            } catch(e) {}
        });
    })();
    </script>
    <script>

    <script src="{{ url_for('static', filename='slides.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
